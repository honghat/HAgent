<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 12px;
      margin: 0;
      background-color: #0f1320;
      color: #e2e8f0;
    }
    h3 {
      margin-top: 0;
      font-size: 14px;
      color: #38bdf8;
      border-bottom: 1px solid #334155;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    .btn {
      width: 100%;
      background-color: #0284c7;
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #0369a1;
    }
    .btn:disabled {
      background-color: #334155;
      color: #64748b;
      cursor: not-allowed;
    }
    .status {
      font-size: 11px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background-color: #1e293b;
      word-break: break-all;
      line-height: 1.4;
      border: 1px solid #334155;
    }
    .input-group {
      margin-bottom: 8px;
    }
    .input-group label {
      display: block;
      font-size: 10px;
      color: #94a3b8;
      margin-bottom: 3px;
      font-weight: 600;
    }
    .input-group input {
      width: 93%;
      background-color: #1e293b;
      border: 1px solid #475569;
      color: white;
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 4px;
      outline: none;
    }
    .input-group input:focus {
      border-color: #0284c7;
    }
  </style>
</head>
<body>
  <h3>🔑 HAgent Cookie Sync</h3>
  <div class="input-group">
    <label for="hagent-url">HAgent API URL:</label>
    <input type="text" id="hagent-url" value="http://127.0.0.1:8010" />
  </div>
  <div class="input-group">
    <label for="hagent-token">HAgent JWT Token (tự lấy từ HAgent Web nếu để trống):</label>
    <input type="password" id="hagent-token" placeholder="Dán JWT token hoặc tự lấy..." />
  </div>
  <button id="sync-fb-btn" class="btn">Đồng bộ Cookie Facebook</button>
  <button id="sync-zalo-btn" class="btn" style="background-color: #0ea5e9; margin-top: 6px;">Đồng bộ Cookie Zalo</button>
  <div id="status" class="status">Sẵn sàng. Mở tab Facebook/Zalo rồi bấm nút tương ứng để đồng bộ.</div>
  <script src="popup.js"></script>
</body>
</html>
